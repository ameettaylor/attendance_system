<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Field Engineer Dispatch</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="w-full max-w-sm">

    <!-- Logo / title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-blue-600 mb-4">
        <!-- hard-hat icon (SVG inline) -->
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3C8 3 5 6 5 10v1H3v2h18v-2h-2v-1c0-4-3-7-7-7z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13h18v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Field Engineer Dispatch</h1>
      <p class="text-sm text-gray-500 mt-1">Dispatcher &amp; Supervisor Portal</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-md px-8 py-10">

      <!-- Error banner -->
      {% if error %}
      <div class="mb-5 flex items-start gap-3 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        <svg class="mt-0.5 w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">

        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            autofocus
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400"
            placeholder="your username"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400"
            placeholder="••••••••"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                 text-white font-semibold py-2.5 text-sm transition-colors duration-150"
        >
          Sign in
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Field Engineer Attendance System &copy; 2026
    </p>
  </div>

</body>
</html>
